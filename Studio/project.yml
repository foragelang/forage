name: Studio
options:
  bundleIdPrefix: com.foragelang
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"

packages:
  Forage:
    path: ..

targets:
  Studio:
    type: application
    platform: macOS
    sources:
      - path: Sources/Studio
    info:
      path: Info.plist
      properties:
        CFBundleName: Forage Studio
        CFBundleDisplayName: Forage Studio
        CFBundleIdentifier: com.foragelang.Studio
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHighResolutionCapable: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        CFBundleURLTypes:
          - CFBundleURLName: com.foragelang.Studio.recipe
            CFBundleURLSchemes:
              - forage-studio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.foragelang.Studio
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: NO
    dependencies:
      - package: Forage
        product: Forage

  StudioTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/StudioTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.foragelang.StudioTests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Studio.app/Contents/MacOS/Studio
    dependencies:
      - target: Studio
      - package: Forage
        product: Forage

schemes:
  Studio:
    build:
      targets:
        Studio: all
        StudioTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - StudioTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
