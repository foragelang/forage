name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build & test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  lint:
    name: swift-format lint
    runs-on: macos-15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check swift-format availability
        id: have-swift-format
        run: |
          if command -v swift-format >/dev/null 2>&1; then
            echo "ok=1" >> "$GITHUB_OUTPUT"
          else
            echo "swift-format not on PATH; skipping lint"
            echo "ok=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint
        if: steps.have-swift-format.outputs.ok == '1'
        run: swift-format lint --recursive Sources Tests
