name: Rules review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: hideselfview/agent-instructions/.github/workflows/rules-review.yml@main
    with:
      project: forage
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
