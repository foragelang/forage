name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to check out'
        required: false
        type: string
        default: ''

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Setup Linux build environment
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/setup-linux
      # `--all-features` would pull in `live` (wry+tao) on every platform,
      # which is correct for the matrix but slow. Keep the default feature
      # set for clippy; the test matrix exercises everything.
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Setup Linux build environment
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/setup-linux
      - run: cargo build --workspace --all-targets
      # `forage-studio`'s lib-test binary fails to load on Windows with
      # STATUS_ENTRYPOINT_NOT_FOUND — Tauri's runtime imports
      # comctl32 v6 symbols, but cargo's `--test` build of a lib target
      # doesn't carry Tauri's production app manifest (declaring v6),
      # so the Windows loader picks the legacy v5 comctl32 and rejects
      # the binary before any test runs. There's no cargo
      # link-arg scope ("lib in test mode") that would let us embed
      # the manifest only for test binaries — see
      # https://github.com/tauri-apps/tauri/issues/14580 (open / un-triaged).
      # Build + clippy still cover forage-studio on Windows; only test
      # execution is skipped.
      - name: Test
        if: matrix.os != 'windows-latest'
        run: cargo test --workspace
      - name: Test (Windows excludes forage-studio)
        if: matrix.os == 'windows-latest'
        run: cargo test --workspace --exclude forage-studio

  wasm:
    name: forage-wasm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - name: Build forage-wasm
        working-directory: crates/forage-wasm
        run: wasm-pack build --target web --out-dir ../../hub-site/forage-wasm/pkg
      - name: Verify pkg checked in matches build
        run: |
          if ! git diff --exit-code hub-site/forage-wasm/pkg; then
            echo "::warning::checked-in hub-site/forage-wasm/pkg is stale; run \`wasm-pack build --target web --out-dir hub-site/forage-wasm/pkg\` from crates/forage-wasm and commit."
          fi

  studio-tauri-build:
    name: Forage Studio (Tauri) — backend cargo check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Setup Linux build environment
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/setup-linux
      # Backend-only check — the frontend (packages/studio-ui) lives on its
      # own npm-driven cadence and is built by `cargo tauri build` only
      # when a release is cut. Keeping CI fast.
      - run: cargo check -p forage-studio
