name: Rust Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-apple-darwin
            os: macos-15
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev

      - name: Cross-compile for aarch64-linux
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build forage CLI
        run: cargo build --release --bin forage --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp target/${{ matrix.target }}/release/forage.exe dist/
            cd dist && 7z a forage-${GITHUB_REF_NAME:-dev}-${{ matrix.target }}.zip forage.exe
          else
            cp target/${{ matrix.target }}/release/forage dist/
            cd dist && tar -czf forage-${GITHUB_REF_NAME:-dev}-${{ matrix.target }}.tar.gz forage
          fi

      - name: SHA-256
        shell: bash
        run: |
          cd dist
          if command -v sha256sum >/dev/null; then
            sha256sum forage-*.{tar.gz,zip} 2>/dev/null > forage-${{ matrix.target }}.sha256 || true
          else
            shasum -a 256 forage-*.tar.gz > forage-${{ matrix.target }}.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: forage-${{ matrix.target }}
          path: dist/

  release:
    name: GitHub Release
    needs: build-cli
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true
          body: |
            ## Forage `${{ github.ref_name }}`

            Rust workspace release. Forage Studio.app (Tauri) ships once
            R9 lands; for now this release contains the `forage` CLI for
            macOS (arm64 + x86_64), Linux (x86_64 + arm64), and Windows
            (x86_64).

            Install:
            ```sh
            curl -fsSL https://foragelang.com/install.sh | sh
            ```

            Or manually:
            ```sh
            curl -L https://github.com/foragelang/forage/releases/download/${{ github.ref_name }}/forage-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz \
              | tar -xz
            ./forage --version
            ```
