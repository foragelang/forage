name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI
    runs-on: macos-15
    outputs:
      sha256: ${{ steps.hash.outputs.sha256 }}
      artifact-name: ${{ steps.pack.outputs.artifact-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build arm64
        run: swift build -c release --arch arm64

      - name: Build x86_64 (best-effort)
        id: x86
        continue-on-error: true
        run: swift build -c release --arch x86_64

      - name: Stage binary
        id: stage
        run: |
          set -euo pipefail
          mkdir -p staging
          ARM64_BIN=".build/arm64-apple-macosx/release/forage"
          X86_BIN=".build/x86_64-apple-macosx/release/forage"
          if [ -f "$X86_BIN" ] && [ -f "$ARM64_BIN" ]; then
            echo "Producing universal binary."
            lipo -create -output staging/forage "$ARM64_BIN" "$X86_BIN"
            echo "arch=universal" >> "$GITHUB_OUTPUT"
          else
            echo "Producing arm64-only binary (x86_64 build was unavailable)."
            cp "$ARM64_BIN" staging/forage
            echo "arch=arm64" >> "$GITHUB_OUTPUT"
          fi
          strip -x staging/forage || true
          chmod +x staging/forage
          file staging/forage
          staging/forage --version

      - name: Pack
        id: pack
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-v0.0.0-dev}"
          NAME="forage-${TAG}-macos.tar.gz"
          tar -C staging -czf "$NAME" forage
          echo "artifact-name=$NAME" >> "$GITHUB_OUTPUT"
          ls -la "$NAME"

      - name: SHA256
        id: hash
        run: |
          set -euo pipefail
          NAME="${{ steps.pack.outputs.artifact-name }}"
          HASH=$(shasum -a 256 "$NAME" | awk '{print $1}')
          echo "$HASH  $NAME" > "$NAME.sha256"
          echo "sha256=$HASH" >> "$GITHUB_OUTPUT"
          cat "$NAME.sha256"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli
          path: |
            ${{ steps.pack.outputs.artifact-name }}
            ${{ steps.pack.outputs.artifact-name }}.sha256
          if-no-files-found: error

  build-studio:
    name: Build Studio
    runs-on: macos-15
    outputs:
      sha256: ${{ steps.hash.outputs.sha256 }}
      artifact-name: ${{ steps.pack.outputs.artifact-name }}
      signed: ${{ steps.signing.outputs.signed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Studio.xcodeproj
        working-directory: Studio
        run: xcodegen

      - name: Detect signing secrets
        id: signing
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_DEVELOPER_ID_APPLICATION_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          if [ -n "${APPLE_DEVELOPER_ID_APPLICATION:-}" ] \
            && [ -n "${APPLE_DEVELOPER_ID_APPLICATION_PASSWORD:-}" ] \
            && [ -n "${APPLE_API_KEY_ID:-}" ] \
            && [ -n "${APPLE_API_KEY_ISSUER_ID:-}" ] \
            && [ -n "${APPLE_API_KEY_P8:-}" ]; then
            echo "All signing/notarization secrets present."
            echo "signed=1" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::One or more Apple signing/notarization secrets are missing — falling back to ad-hoc signing. The DMG will still be usable; users will see a Gatekeeper prompt on first launch."
            echo "signed=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Import signing certificate
        if: steps.signing.outputs.signed == '1'
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_DEVELOPER_ID_APPLICATION_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          P12="$RUNNER_TEMP/developer_id.p12"
          echo "$APPLE_DEVELOPER_ID_APPLICATION" | base64 --decode > "$P12"
          security import "$P12" \
            -k "$KEYCHAIN" \
            -P "$APPLE_DEVELOPER_ID_APPLICATION_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

          IDENT=$(security find-identity -v -p codesigning "$KEYCHAIN" | grep "Developer ID Application" | head -n1 | sed -E 's/^[^"]*"([^"]+)".*$/\1/')
          if [ -z "$IDENT" ]; then
            echo "::error::Imported keychain has no Developer ID Application identity."
            security find-identity -v -p codesigning "$KEYCHAIN"
            exit 1
          fi
          echo "Signing identity: $IDENT"
          echo "SIGNING_IDENTITY=$IDENT" >> "$GITHUB_ENV"
          echo "BUILD_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "BUILD_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Archive Studio
        run: |
          set -euo pipefail
          mkdir -p build
          if [ "${{ steps.signing.outputs.signed }}" = "1" ]; then
            xcodebuild \
              -project Studio/Studio.xcodeproj \
              -scheme Studio \
              -configuration Release \
              -archivePath build/Studio.xcarchive \
              -destination 'generic/platform=macOS' \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
              OTHER_CODE_SIGN_FLAGS="--keychain $BUILD_KEYCHAIN --options runtime --timestamp" \
              ENABLE_HARDENED_RUNTIME=YES \
              archive
          else
            xcodebuild \
              -project Studio/Studio.xcodeproj \
              -scheme Studio \
              -configuration Release \
              -archivePath build/Studio.xcarchive \
              -destination 'generic/platform=macOS' \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="-" \
              archive
          fi

      - name: Write exportOptions.plist
        env:
          SIGNED: ${{ steps.signing.outputs.signed }}
        run: |
          set -euo pipefail
          mkdir -p build
          if [ "$SIGNED" = "1" ]; then
            METHOD="developer-id"
          else
            METHOD="mac-application"
          fi
          {
            printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>'
            printf '%s\n' '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            printf '%s\n' '<plist version="1.0">'
            printf '%s\n' '<dict>'
            printf '%s\n' '    <key>method</key>'
            printf '    <string>%s</string>\n' "$METHOD"
            printf '%s\n' '    <key>signingStyle</key>'
            printf '%s\n' '    <string>manual</string>'
            printf '%s\n' '</dict>'
            printf '%s\n' '</plist>'
          } > build/exportOptions.plist
          cat build/exportOptions.plist

      - name: Export .app
        run: |
          set -euo pipefail
          if [ "${{ steps.signing.outputs.signed }}" = "1" ]; then
            xcodebuild -exportArchive \
              -archivePath build/Studio.xcarchive \
              -exportOptionsPlist build/exportOptions.plist \
              -exportPath build/export \
              -allowProvisioningUpdates || EXPORT_FAILED=$?
          else
            xcodebuild -exportArchive \
              -archivePath build/Studio.xcarchive \
              -exportOptionsPlist build/exportOptions.plist \
              -exportPath build/export || EXPORT_FAILED=$?
          fi
          if [ -n "${EXPORT_FAILED:-}" ]; then
            echo "::warning::xcodebuild -exportArchive failed; copying the app directly out of the xcarchive."
            mkdir -p build/export
            cp -R build/Studio.xcarchive/Products/Applications/Studio.app build/export/
          fi
          ls build/export

      - name: Notarize + staple
        if: steps.signing.outputs.signed == '1'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"

          APP_PATH="build/export/Studio.app"
          ZIP_PATH="$RUNNER_TEMP/Studio-for-notarization.zip"
          /usr/bin/ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          xcrun notarytool submit "$ZIP_PATH" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_KEY_ISSUER_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      - name: Build DMG
        id: pack
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-v0.0.0-dev}"
          NAME="Forage-Studio-${TAG}-macos.dmg"
          APP_PATH="build/export/Studio.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::No Studio.app at $APP_PATH"
            exit 1
          fi

          STAGE="$RUNNER_TEMP/dmg-stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp -R "$APP_PATH" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"

          hdiutil create \
            -volname "Forage Studio" \
            -srcfolder "$STAGE" \
            -ov \
            -format UDZO \
            "$NAME"

          if [ "${{ steps.signing.outputs.signed }}" = "1" ]; then
            codesign --force --sign "$SIGNING_IDENTITY" --keychain "$BUILD_KEYCHAIN" --timestamp "$NAME"
            xcrun stapler staple "$NAME" || echo "::warning::DMG staple failed; the inside .app is still stapled."
          fi
          echo "artifact-name=$NAME" >> "$GITHUB_OUTPUT"
          ls -la "$NAME"

      - name: SHA256
        id: hash
        run: |
          set -euo pipefail
          NAME="${{ steps.pack.outputs.artifact-name }}"
          HASH=$(shasum -a 256 "$NAME" | awk '{print $1}')
          echo "$HASH  $NAME" > "$NAME.sha256"
          echo "sha256=$HASH" >> "$GITHUB_OUTPUT"
          cat "$NAME.sha256"

      - name: Upload Studio artifact
        uses: actions/upload-artifact@v4
        with:
          name: studio
          path: |
            ${{ steps.pack.outputs.artifact-name }}
            ${{ steps.pack.outputs.artifact-name }}.sha256
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: [build-cli, build-studio]
    runs-on: macos-15
    outputs:
      cli-sha256: ${{ needs.build-cli.outputs.sha256 }}
      cli-artifact: ${{ needs.build-cli.outputs.artifact-name }}
      studio-sha256: ${{ needs.build-studio.outputs.sha256 }}
      studio-artifact: ${{ needs.build-studio.outputs.artifact-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: cli
          path: artifacts

      - name: Download Studio artifact
        uses: actions/download-artifact@v4
        with:
          name: studio
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts

      - name: Compose release notes
        id: notes
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-v0.0.0-dev}"
          NOTES="$RUNNER_TEMP/notes.md"
          {
            if [ -f CHANGELOG.md ]; then
              echo "# Release $TAG"
              echo
              awk -v tag="$TAG" '
                BEGIN { copy = 0 }
                /^## / {
                  if (copy) exit
                  if (index($0, tag) > 0) { copy = 1; print; next }
                }
                copy { print }
              ' CHANGELOG.md
              echo
            else
              echo "# Release $TAG"
              echo
              echo "Auto-generated release."
              echo
            fi
            echo "## Artifacts"
            echo
            echo "- \`${{ needs.build-cli.outputs.artifact-name }}\` (\`sha256: ${{ needs.build-cli.outputs.sha256 }}\`)"
            echo "- \`${{ needs.build-studio.outputs.artifact-name }}\` (\`sha256: ${{ needs.build-studio.outputs.sha256 }}\`)"
            echo
            if [ "${{ needs.build-studio.outputs.signed }}" != "1" ]; then
              echo "**Note:** The Studio DMG in this release is ad-hoc signed (no Developer ID signature, not notarized). macOS will show a Gatekeeper warning on first launch; right-click and choose \"Open\" to bypass it."
              echo
            fi
            echo "## Install"
            echo
            echo "\`\`\`sh"
            echo "brew install foragelang/forage/forage"
            echo "\`\`\`"
            echo
            echo "or"
            echo
            echo "\`\`\`sh"
            echo "curl -fsSL https://foragelang.com/install.sh | sh"
            echo "\`\`\`"
          } > "$NOTES"
          echo "path=$NOTES" >> "$GITHUB_OUTPUT"
          cat "$NOTES"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "${{ steps.notes.outputs.path }}" \
            artifacts/*

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: [release]
    if: ${{ vars.ENABLE_HOMEBREW_TAP_UPDATE == '1' }}
    runs-on: ubuntu-latest
    steps:
      - name: Guard on PAT
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping homebrew tap update. Update Formula/forage.rb manually in foragelang/homebrew-tap."
            exit 0
          fi
          echo "PAT present; proceeding."

      - name: Checkout tap
        if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: foragelang/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Bump formula
        if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
        env:
          TAG: ${{ github.ref_name }}
          SHA: ${{ needs.release.outputs.cli-sha256 }}
          ARTIFACT: ${{ needs.release.outputs.cli-artifact }}
        run: |
          set -euo pipefail
          FORMULA="tap/Formula/forage.rb"
          mkdir -p "$(dirname "$FORMULA")"
          VERSION="${TAG#v}"
          URL="https://github.com/foragelang/forage/releases/download/${TAG}/${ARTIFACT}"
          {
            printf '%s\n' 'class Forage < Formula'
            printf '%s\n' '  desc "Declarative scraping platform — CLI for the forage runtime"'
            printf '%s\n' '  homepage "https://foragelang.com"'
            printf '  url "%s"\n' "$URL"
            printf '  version "%s"\n' "$VERSION"
            printf '  sha256 "%s"\n' "$SHA"
            printf '%s\n' '  license "MIT"'
            printf '\n'
            printf '%s\n' '  depends_on macos: :sonoma'
            printf '\n'
            printf '%s\n' '  def install'
            printf '%s\n' '    bin.install "forage"'
            printf '%s\n' '  end'
            printf '\n'
            printf '%s\n' '  test do'
            printf '%s\n' '    assert_match "forage", shell_output("#{bin}/forage --help")'
            printf '%s\n' '  end'
            printf '%s\n' 'end'
          } > "$FORMULA"
          cd tap
          git config user.name "forage-release-bot"
          git config user.email "release-bot@foragelang.com"
          git add Formula/forage.rb
          if git diff --cached --quiet; then
            echo "No changes to formula."
            exit 0
          fi
          git commit -m "forage ${TAG}"
          git push origin HEAD
