# Centralize ts-rs binding output so every crate exports to the same
# logical directory. Without this, each crate's #[ts(export_to = ...)]
# uses its own relative base (CARGO_MANIFEST_DIR/bindings/), and ts-rs
# emits broken cross-crate imports because it sees the targets as
# different directories.
#
# This points all derives at <repo>/packages/studio-ui/src/bindings/
# regardless of which crate the type lives in. The Studio app and the
# hub IDE both consume the same shared package.
[env]
TS_RS_EXPORT_DIR = { value = "packages/studio-ui/src/bindings", relative = true }
